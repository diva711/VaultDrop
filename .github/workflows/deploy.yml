name: Deploy VaultDrop

on:
  push:
    branches:
      - main

env:
  AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}

jobs:
  deploy-infrastructure:
    name: Terraform Apply
    runs-on: ubuntu-latest
    outputs:
      frontend_bucket:    ${{ steps.bucket.outputs.frontend_bucket }}
      ecr_repository_url: ${{ steps.ecr.outputs.ecr_repository_url }}
      apprunner_role_arn: ${{ steps.role.outputs.apprunner_role_arn }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Build Lambda zip
        working-directory: lambda
        run: |
          npm install
          zip -r ../terraform/lambda.zip index.js package.json node_modules

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          TF_VAR_aws_region:  ${{ secrets.AWS_REGION }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Get ECR URL
        id: ecr
        working-directory: terraform
        run: echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT

      - name: Get frontend bucket
        id: bucket
        working-directory: terraform
        run: echo "frontend_bucket=$(terraform output -raw frontend_bucket)" >> $GITHUB_OUTPUT

      - name: Get AppRunner role
        id: role
        working-directory: terraform
        run: echo "apprunner_role_arn=$(terraform output -raw apprunner_role_arn)" >> $GITHUB_OUTPUT

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: deploy-infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        working-directory: backend
        env:
          ECR_URL: ${{ needs.deploy-infrastructure.outputs.ecr_url }}
        run: |
          docker build -t $ECR_URL:latest .
          docker push $ECR_URL:latest

      - name: Deploy or update App Runner
        env:
          ECR_URL:        ${{ needs.deploy-infrastructure.outputs.ecr_url }}
          APPRUNNER_ROLE: ${{ needs.deploy-infrastructure.outputs.apprunner_role }}
          DB_PASSWORD:    ${{ secrets.DB_PASSWORD }}
          S3_BUCKET:      ${{ needs.deploy-infrastructure.outputs.s3_bucket }}
        run: |
          # Check if service already exists
          SERVICE_ARN=$(aws apprunner list-services --region ${{ secrets.AWS_REGION }} \
            --query "ServiceSummaryList[?ServiceName=='vaultdrop-backend'].ServiceArn" \
            --output text)

          if [ -z "$SERVICE_ARN" ]; then
            echo "Creating App Runner service..."
            aws apprunner create-service \
              --service-name vaultdrop-backend \
              --region ${{ secrets.AWS_REGION }} \
              --source-configuration "{
                \"AuthenticationConfiguration\": {\"AccessRoleArn\": \"$APPRUNNER_ROLE\"},
                \"ImageRepository\": {
                  \"ImageIdentifier\": \"$ECR_URL:latest\",
                  \"ImageRepositoryType\": \"ECR\",
                  \"ImageConfiguration\": {
                    \"Port\": \"3000\",
                    \"RuntimeEnvironmentVariables\": {
                      \"DATABASE_URL\": \"${{ secrets.DATABASE_URL }}\",
                      \"S3_BUCKET\": \"$S3_BUCKET\",
                      \"PORT\": \"3000\"
                    }
                  }
                },
                \"AutoDeploymentsEnabled\": true
              }"
          else
            echo "Updating App Runner service..."
            aws apprunner update-service \
              --service-arn $SERVICE_ARN \
              --region ${{ secrets.AWS_REGION }} \
              --source-configuration "{
                \"AuthenticationConfiguration\": {\"AccessRoleArn\": \"$APPRUNNER_ROLE\"},
                \"ImageRepository\": {
                  \"ImageIdentifier\": \"$ECR_URL:latest\",
                  \"ImageRepositoryType\": \"ECR\",
                  \"ImageConfiguration\": {
                    \"Port\": \"3000\",
                    \"RuntimeEnvironmentVariables\": {
                      \"DATABASE_URL\": \"${{ secrets.DATABASE_URL }}\",
                      \"S3_BUCKET\": \"$S3_BUCKET\",
                      \"PORT\": \"3000\"
                    }
                  }
                }
              }"
          fi

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and build
        working-directory: frontend
        run: |
          npm install
          npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.BACKEND_URL }}

      - name: Deploy to S3
        working-directory: frontend
        run: |
          aws s3 sync build/ s3://${{ needs.deploy-infrastructure.outputs.frontend_bucket }} --delete

      